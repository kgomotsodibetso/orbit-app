<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Orbit Library · App Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- Tailwind CDN for utility classes -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        steel:    '#4B8EBA',
        golden:   '#F6B93B',
        lavender: '#A29FEC',
        cream:    '#F0E5DF',
        slate:    '#2C3A47',
      },
      fontFamily: {
        sans: ['Montserrat', 'ui-sans-serif', 'system-ui', 'sans-serif'],
      },
      borderRadius: {
        '3xl': '24px',
      }
    }
  }
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Montserrat', ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Device switcher */
  #device-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    height: 48px; background: #1C2830;
    display: flex; align-items: center; justify-center; gap: 0;
    padding: 0 16px; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #device-bar .logo { display: flex; align-items: center; gap: 8px; }
  #device-bar .logo span { font-size: 12px; font-weight: 800; color: #F0E5DF; letter-spacing: -0.3px; }
  .dev-btn {
    display: flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 8px;
    font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    font-family: 'Montserrat', sans-serif; border: 1.5px solid rgba(255,255,255,0.12);
    color: rgba(240,229,223,0.5); background: transparent;
  }
  .dev-btn.active { background: rgba(75,142,186,0.2); color: #4B8EBA; border-color: rgba(75,142,186,0.35); }
  .dev-btn-group { display: flex; gap: 6px; }

  #app-wrap {
    position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0E1820;
    transition: all 0.3s;
  }
  #app-wrap.desktop-mode #app-frame {
    width: 100%; height: 100%; border-radius: 0; box-shadow: none;
  }
  #app-wrap.mobile-mode {
    padding: 16px;
  }
  #app-wrap.mobile-mode #app-frame {
    width: 390px; height: 844px; border-radius: 44px;
    box-shadow: 0 0 0 10px #1C2830, 0 0 0 12px #2C3A47, 0 24px 80px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  #app-frame {
    background: white; overflow: hidden; position: relative;
    display: flex; flex-direction: column;
  }

  /* Page navigator pills */
  #page-nav {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9998; background: rgba(28,40,48,0.92); backdrop-filter: blur(12px);
    border-radius: 99px; border: 1px solid rgba(255,255,255,0.08);
    display: flex; gap: 4px; padding: 6px;
    flex-wrap: wrap; max-width: 90vw; justify-content: center;
  }
  .pnav-btn {
    padding: 5px 12px; border-radius: 99px; font-size: 10px; font-weight: 700;
    cursor: pointer; transition: all 0.12s; font-family: 'Montserrat', sans-serif;
    border: none; color: rgba(240,229,223,0.45); background: transparent;
  }
  .pnav-btn:hover { color: #F0E5DF; }
  .pnav-btn.active { background: rgba(75,142,186,0.25); color: #4B8EBA; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(44,58,71,0.2); border-radius: 2px; }
</style>
</head>
<body>

<!-- Device bar -->
<div id="device-bar">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 160 160" fill="none">
      <defs>
        <linearGradient id="db-body" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#C4C0FB"/>
          <stop offset="38%" stop-color="#4B8EBA"/>
          <stop offset="100%" stop-color="#2C3A47"/>
        </linearGradient>
        <linearGradient id="db-arc" x1="10" y1="35" x2="150" y2="125" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
          <stop offset="40%" stop-color="#FFD060"/>
          <stop offset="100%" stop-color="rgba(255,208,96,0.3)"/>
        </linearGradient>
      </defs>
      <circle cx="80" cy="80" r="76" fill="url(#db-body)"/>
      <circle cx="80" cy="80" r="44" fill="#1C2830"/>
      <ellipse cx="80" cy="80" rx="92" ry="23" stroke="url(#db-arc)" stroke-width="7.5" fill="none" stroke-linecap="round" transform="rotate(-40 80 80)"/>
      <circle cx="140" cy="42" r="9.5" fill="#FFD060"/>
    </svg>
    <span>Orbit Prototype</span>
  </div>
  <div class="dev-btn-group">
    <button class="dev-btn active" id="btn-desktop" onclick="setDevice('desktop')">🖥 Desktop</button>
    <button class="dev-btn" id="btn-mobile"  onclick="setDevice('mobile')">📱 Mobile</button>
  </div>
</div>

<!-- App frame -->
<div id="app-wrap" class="desktop-mode">
  <div id="app-frame">
    <div id="root"></div>
  </div>
</div>

<!-- Page nav (for quick jumping) -->
<div id="page-nav">
  <button class="pnav-btn active" onclick="navTo('login')">Login</button>
  <button class="pnav-btn" onclick="navTo('register')">Register</button>
  <button class="pnav-btn" onclick="navTo('forgot')">Forgot PW</button>
  <button class="pnav-btn" onclick="navTo('dashboard')">Dashboard</button>
  <button class="pnav-btn" onclick="navTo('catalogue')">Catalogue</button>
  <button class="pnav-btn" onclick="navTo('loans')">Loans</button>
  <button class="pnav-btn" onclick="navTo('learners')">Learners</button>
  <button class="pnav-btn" onclick="navTo('reports')">Reports</button>
  <button class="pnav-btn" onclick="navTo('settings')">Settings</button>
  <button class="pnav-btn" onclick="navTo('learner-portal')">Learner Portal</button>
</div>

<script>
  let currentDevice = 'desktop';
  let currentPage   = 'login';
  let appSetPage    = null; // set by React after mount
  let appSetAuthed  = null;

  function setDevice(d) {
    currentDevice = d;
    const wrap = document.getElementById('app-wrap');
    wrap.className = d + '-mode';
    document.getElementById('btn-desktop').className = 'dev-btn' + (d==='desktop' ? ' active' : '');
    document.getElementById('btn-mobile').className  = 'dev-btn' + (d==='mobile'  ? ' active' : '');
    window.__deviceMode = d;
    // Trigger re-render
    if (window.__setDeviceMode) window.__setDeviceMode(d);
  }

  function navTo(page) {
    currentPage = page;
    document.querySelectorAll('.pnav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (window.__appNavTo) window.__appNavTo(page);
  }

  window.setDevice = setDevice;
  window.navTo = navTo;
  window.__deviceMode = 'desktop';
</script>

<!-- Shared components -->
<script type="text/babel" src="orbit/shared.jsx"></script>

<!-- All pages + App -->
<script type="text/babel" src="orbit/app.jsx"></script>

<!-- Bootstrap -->
<script type="text/babel">
(function() {
  function Root() {
    const [deviceMode, setDeviceMode] = React.useState('desktop');
    React.useEffect(() => { window.__setDeviceMode = setDeviceMode; }, []);
    return <App isMobile={deviceMode === 'mobile'}/>;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
})();
</script>

</body>
</html>
